<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RegNav App</title>
</head>
<body>
  <h1>RegNav</h1>

  <button id="saveBtn">Save Term</button>

  <input id="fTerm" placeholder="Term">
  <input id="fSource" placeholder="Source">
  <input id="fSection" placeholder="Section">
  <input id="fDef" placeholder="Definition">
  <input id="fCats" placeholder="Categories (comma separated)">

<script>
// GLOBAL STATE
let PRACTICE_DATA = {};
let TERMS = [];
let CFR_DATA = [];

// LOAD DATA
async function loadData() {
  try {
    let res = await fetch('/api/data');

    if (!res.ok) {
      res = await fetch('./data.json');
    }

    const data = await res.json();

    PRACTICE_DATA = data.practices || {};
    TERMS = data.terms || [];
    CFR_DATA = data.cfr || [];

    console.log("Data loaded", data);
  } catch (err) {
    console.error('Failed to load data', err);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  loadData();

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.onclick = async () => {
    const term = {
      name: document.getElementById('fTerm').value,
      source: document.getElementById('fSource').value,
      section: document.getElementById('fSection').value,
      definition: document.getElementById('fDef').value,
      categories: document.getElementById('fCats').value.split(',').map(s => s.trim())
    };

    await fetch('/api/terms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(term)
    });

    alert("Saved");
    loadData();
  };
});
</script>
</body>
</html>
