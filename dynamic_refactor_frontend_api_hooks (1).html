  try {

    if (!res.ok) {
      throw new Error('No valid data source');
    }

    const data = await res.json();

    PRACTICE_DATA = data.practices || {};
    TERMS = data.terms || [];
    CFR_DATA = data.cfr || [];

    if (typeof initializeApp === 'function') {
      initializeApp();
    }

  } catch (err) {
    console.error('Failed to load data', err);
  }
}

    const contentType = res.headers.get('content-type');
    if (!contentType || !contentType.includes('application/json')) {

      throw new Error('Response is not JSON');
    }

    const data = await res.json();

    PRACTICE_DATA = data.practices || {};

    }

  } catch (err) {

  }

// RUN AFTER DOM READY
window.addEventListener('DOMContentLoaded', () => {
  loadData();

  const saveBtn = document.getElementById('saveBtn');
  if (!saveBtn) {
    console.warn('saveBtn not found in DOM');
    return;
  }

  saveBtn.onclick = async () => {
    const term = {
      name: document.getElementById('fTerm').value,
      source: document.getElementById('fSource').value,
      section: document.getElementById('fSection').value,
      definition: document.getElementById('fDef').value,
      categories: document.getElementById('fCats').value.split(',').map(s => s.trim())

      return;
    }

    await fetch('/api/terms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(term)
    });

    if (typeof showToast === 'function') showToast('Saved');
    loadData();

// TERM LOOKUP
function findTerm(name) {

<!-- server.js -->
<script type="text/plain">
const express = require('express');
const fs = require('fs');
const app = express();

app.use(express.json());

const FILE = './data.json';

app.get('/api/data', (req, res) => {
  const data = JSON.parse(fs.readFileSync(FILE));
  res.json(data);
});

app.post('/api/terms', (req, res) => {
  const data = JSON.parse(fs.readFileSync(FILE));
  data.terms.push(req.body);
  fs.writeFileSync(FILE, JSON.stringify(data, null, 2));
  res.sendStatus(200);
});

app.listen(3000, () => console.log('API running on 3000'));
</script>
