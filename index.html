<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RegNav Merged</title>
<style>
.edit-mode .editable { outline:2px dashed orange; cursor:pointer; }
</style>
</head>
<body>

<h1>RegNav (Merged UI)</h1>
<button onclick="toggleEditMode()">Edit Mode</button>

<div id="app"></div>

<script>
// ===== STATE =====
let PRACTICE_DATA = {};
let SCOPING = [];
let CFR_STRUCTURE = {};
let DB = [];
let EDIT_MODE = false;

// ===== LOAD =====
async function loadData(){
 const res = await fetch('/api/data');
 const data = await res.json();
 PRACTICE_DATA = data.practices || {};
 render();
}

// ===== RENDER (simplified hook for your UI) =====
function render(){
 const app = document.getElementById('app');
 app.innerHTML = '';

 Object.entries(PRACTICE_DATA).forEach(([id,p])=>{
  const div = document.createElement('div');
  div.innerHTML = `
    <h3>${id}: <span class="editable" data-type="practice" data-id="${id}" data-field="title">${p.title||''}</span></h3>
    <div class="editable" data-type="practice" data-id="${id}" data-field="discussion">${p.discussion||''}</div>
  `;
  app.appendChild(div);
 });
}

// ===== EDIT MODE =====
function toggleEditMode(){
 EDIT_MODE = !EDIT_MODE;
 document.body.classList.toggle('edit-mode', EDIT_MODE);
}

// ===== CLICK EDIT =====
document.addEventListener('click', e=>{
 if(!EDIT_MODE) return;
 const el = e.target.closest('.editable');
 if(!el) return;
 makeEditable(el);
});

function makeEditable(el){
 const val = el.innerText;
 const ta = document.createElement('textarea');
 ta.value = val;
 ta.style.width='100%';
 el.replaceWith(ta);
 ta.focus();

 ta.addEventListener('blur', async ()=>{
  const newVal = ta.value;
  const span = document.createElement('span');
  span.className='editable';
  span.dataset.type = el.dataset.type;
  span.dataset.id = el.dataset.id;
  span.dataset.field = el.dataset.field;
  span.innerText = newVal;
  ta.replaceWith(span);
  await saveEdit(span.dataset,newVal);
 });
}

async function saveEdit(meta,val){
 const {id,field} = meta;
 PRACTICE_DATA[id][field]=val;

 await fetch('/api/practices',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify(PRACTICE_DATA)
 });
}

// INIT
window.addEventListener('DOMContentLoaded',loadData);
</script>

</body>
</html>
